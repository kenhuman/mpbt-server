name: Bug Report
description: Something is broken or behaving unexpectedly.
labels: ["type: bug", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill out all required fields so this can be triaged quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Start the server with `npm run dev`
        2. Connect with the MPBT client
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include any error messages, stack traces, or packet captures.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Node.js version:
        - OS:
        - MPBT client patch level:
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Low — cosmetic or minor inconvenience"
        - "Medium — functionality impaired but workaround exists"
        - "High — major functionality broken, no workaround"
        - "Critical — server crash or data loss"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Packet captures, logs, screenshots, or anything else relevant.
