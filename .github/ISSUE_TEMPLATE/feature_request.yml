name: Feature Request
description: Suggest a new feature or enhancement.
labels: ["type: feature", "status: needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem or gap does this feature address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Low — nice to have"
        - "Medium — would meaningfully improve the project"
        - "High — important for core functionality"
        - "Critical — blocking other work"
    validations:
      required: true

  - type: checkboxes
    id: re_required
    attributes:
      label: Requires RE Work?
      options:
        - label: This feature requires additional reverse engineering to implement.
