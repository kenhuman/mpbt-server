name: Documentation
description: Report missing, incorrect, or unclear documentation.
labels: ["type: docs", "status: needs-triage"]
body:
  - type: dropdown
    id: document
    attributes:
      label: Document
      options:
        - README.md
        - RESEARCH.md
        - CONTRIBUTING.md
        - Code comments
        - Other
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What Is Wrong or Missing
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Low"
        - "Medium"
        - "High"
    validations:
      required: true
