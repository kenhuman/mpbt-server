name: PR Size Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  label-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const changes = pr.additions + pr.deletions;
            const bands = [
              [9,        'size: xs'],
              [49,       'size: s'],
              [149,      'size: m'],
              [299,      'size: l'],
              [Infinity, 'size: xl'],
            ];
            const newLabel = bands.find(([max]) => changes <= max)[1];

            // Remove any existing size labels first
            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
            });
            for (const label of existing.filter(l => l.name.startsWith('size: '))) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: pr.number,
                name: label.name,
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
              labels: [newLabel],
            });

            core.info(`PR #${pr.number}: ${changes} lines changed → ${newLabel}`);
