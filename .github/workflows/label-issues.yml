name: Label Issues

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  add-priority-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body ?? '';

            // GitHub renders issue form dropdowns as:
            //   ### Priority
            //
            //   Medium — functionality impaired but workaround exists
            const m = body.match(/### Priority\s*\n+([^\n]+)/);
            if (!m) return;

            const value = m[1].trim().toLowerCase();
            let label;
            if      (value.startsWith('critical')) label = 'priority: critical';
            else if (value.startsWith('high'))     label = 'priority: high';
            else if (value.startsWith('medium'))   label = 'priority: medium';
            else if (value.startsWith('low'))      label = 'priority: low';

            if (label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: [label],
              });
            }
