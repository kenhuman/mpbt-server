services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mpbt
      POSTGRES_PASSWORD: mpbt
      POSTGRES_DB: mpbt
    ports:
      - "5432:5432"
    volumes:
      - mpbt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpbt -d mpbt"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mpbt_pgdata:
